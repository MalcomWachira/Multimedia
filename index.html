<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save Our Wildlife</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <h1>Save Our Wildlife</h1>
        <div class="video-wrapper">
            <video id="wildlifeVideo" controls aria-label="Wildlife conservation promotional video">
                <source src="wildlife.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
        <p class="description">
            Our planet's incredible wildlife is facing unprecedented threats. Watch this promotional film to discover how our conservation initiatives protect endangered species and how you can take action today.
        </p>
        <button id="videoBtn" aria-live="polite">Play Video</button>
    </main>

    <script src="index.js"></script>
</body>
</html>
